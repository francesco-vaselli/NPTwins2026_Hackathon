name: build-leaderboard

# Rebuilds LEADERBOARD.md whenever a new scorecard lands on main.
# Commits the regenerated file back to the branch.

on:
  push:
    branches: [main]
    paths:
      - 'submissions/scorecards/**'
      - 'scripts/build_leaderboard.py'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Rebuild LEADERBOARD.md
        run: python scripts/build_leaderboard.py

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain LEADERBOARD.md)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add LEADERBOARD.md
            git commit -m "chore: rebuild leaderboard"
            git push
          else
            echo "No leaderboard changes."
          fi
