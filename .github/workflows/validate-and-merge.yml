name: validate-and-merge

# Runs on every PR (including from forks) that touches submissions/.
#
# Uses pull_request_target so we have write perms, but we NEVER execute
# any code from the PR — we only `git show` files from the PR ref to
# validate them. The validator script itself is checked out from the
# base branch (trusted).
#
# After validation, we merge the PR directly (no --auto, since the
# default GITHUB_TOKEN cannot call enablePullRequestAutoMerge), then
# rebuild LEADERBOARD.md inline. We do the rebuild inline because a
# GITHUB_TOKEN-driven merge does not trigger downstream workflows
# (GitHub's loop guard), so a separate build-leaderboard workflow
# wouldn't fire on these merges.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    paths:
      - 'submissions/**'

permissions:
  contents: write          # merge PR + push leaderboard rebuild
  pull-requests: write     # merge PR via gh

concurrency:
  group: validate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base (trusted scripts)
        uses: actions/checkout@v4
        with:
          # Default ref is the base branch — DO NOT change to PR head.
          fetch-depth: 0

      - name: Fetch PR head
        run: |
          git fetch origin "pull/${{ github.event.pull_request.number }}/head:pr-head"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate submission
        run: python scripts/validate_submission.py --base origin/${{ github.event.pull_request.base.ref }} --head pr-head

      - name: Merge PR
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge "${{ github.event.pull_request.number }}" --squash --delete-branch --repo "${{ github.repository }}"

      - name: Sync to merged main
        if: success()
        run: |
          git fetch origin "${{ github.event.pull_request.base.ref }}"
          git checkout "${{ github.event.pull_request.base.ref }}"
          git pull --ff-only origin "${{ github.event.pull_request.base.ref }}"

      - name: Rebuild leaderboard
        if: success()
        run: python scripts/build_leaderboard.py

      - name: Commit + push leaderboard if changed
        if: success()
        run: |
          if [ -n "$(git status --porcelain LEADERBOARD.md)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add LEADERBOARD.md
            git commit -m "chore: rebuild leaderboard"
            git push origin "${{ github.event.pull_request.base.ref }}"
          else
            echo "No leaderboard changes."
          fi
